name: Build Tweak with Theos

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          
      - name: Setup Theos (Manual)
        run: |
          set -e
          export THEOS=$HOME/theos
          echo "Installing Theos to $THEOS..."
          git clone --recursive https://github.com/theos/theos.git $THEOS
          
          echo "Installing theos-jailed module..."
          mkdir -p $THEOS/modules
          git clone https://github.com/kabiroberai/theos-jailed.git $THEOS/modules/theos-jailed
          
          echo "Downloading SDKs..."
          mkdir -p $THEOS/sdks
          curl -L https://github.com/theos/sdks/archive/master.zip -o sdks.zip
          unzip -q sdks.zip
          # Pindahkan isi folder sdks-master ke dalam $THEOS/sdks
          mv sdks-master/* $THEOS/sdks/
          rm -rf sdks-master sdks.zip
          
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH
          
      - name: Build tweak
        run: |
          # Di macOS, env THEOS sudah otomatis terbaca dari step sebelumnya
          export ARCHS="arm64 arm64e"
          export TARGET="iphone:clang:latest:11.0"
          make clean
          make package
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlbb-esp
          path: packages/*.deb
