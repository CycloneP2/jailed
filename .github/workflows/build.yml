name: Build Tweak with Theos

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          
      - name: Setup Theos
        uses: Randomblock1/theos-action@v1
        with:
          theos-dir: 'theos'
          theos-src: 'https://github.com/theos/theos'
          theos-sdks: 'https://github.com/theos/sdks'
          orion: 'false'
          
      - name: Install theos-jailed module
        run: |
          # Pakai variabel $THEOS yang sudah disediakan oleh action
          mkdir -p $THEOS/modules
          git clone https://github.com/kabiroberai/theos-jailed.git $THEOS/modules/theos-jailed
          
      - name: Build tweak
        run: |
          # ARCHS dan TARGET sesuaikan dengan Makefile atau set di sini
          export ARCHS="arm64 arm64e"
          export TARGET="iphone:clang:latest:11.0"
          make clean
          make package
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlbb-esp
          path: packages/*.deb
